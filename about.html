<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nandanap@ubuntu: ~</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Ubuntu+Mono:wght@400;700&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        background: #0d0208;
        background-image:
          radial-gradient(
            circle at 20% 30%,
            rgba(138, 43, 226, 0.08) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 80% 70%,
            rgba(75, 0, 130, 0.06) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 50% 50%,
            rgba(94, 166, 217, 0.03) 0%,
            transparent 50%
          );
        background-attachment: fixed;
        font-family: "Ubuntu Mono", monospace;
        position: relative;
      }

      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image:
          repeating-linear-gradient(
            0deg,
            rgba(138, 226, 52, 0.03) 0px,
            transparent 1px,
            transparent 2px,
            rgba(138, 226, 52, 0.03) 3px
          ),
          repeating-linear-gradient(
            90deg,
            rgba(138, 226, 52, 0.03) 0px,
            transparent 1px,
            transparent 2px,
            rgba(138, 226, 52, 0.03) 3px
          );
        pointer-events: none;
        opacity: 0.4;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        min-height: 100vh;
      }

      /* ─── navigation ─── */
      nav {
        position: fixed;
        top: 0;
        right: 0;
        padding: 30px 40px;
        z-index: 1000;
      }

      nav ul {
        list-style: none;
        display: flex;
        gap: 30px;
        margin: 0;
        padding: 0;
      }

      nav a {
        color: #d4c4d3;
        text-decoration: none;
        font-size: 14px;
        font-weight: 400;
        letter-spacing: 0.5px;
        transition: color 0.3s ease;
        position: relative;
      }

      nav a:hover {
        color: #8ae234;
      }

      nav a::after {
        content: "";
        position: absolute;
        bottom: -3px;
        left: 0;
        width: 0;
        height: 1px;
        background: #8ae234;
        transition: width 0.3s ease;
      }

      nav a:hover::after {
        width: 100%;
      }

      .terminal {
        width: 100%;
        max-width: 780px;
        border-radius: 10px;
        overflow: hidden;
        margin-top: 20px;
        box-shadow:
          0 8px 40px rgba(0, 0, 0, 0.4),
          0 0 0 1px rgba(138, 226, 52, 0.1),
          0 0 60px rgba(138, 43, 226, 0.15);
        animation: terminalGlow 3s ease-in-out infinite alternate;
      }

      @keyframes terminalGlow {
        0% {
          box-shadow:
            0 8px 40px rgba(0, 0, 0, 0.4),
            0 0 0 1px rgba(138, 226, 52, 0.1),
            0 0 60px rgba(138, 43, 226, 0.15);
        }
        100% {
          box-shadow:
            0 8px 40px rgba(0, 0, 0, 0.5),
            0 0 0 1px rgba(138, 226, 52, 0.15),
            0 0 80px rgba(138, 43, 226, 0.25);
        }
      }

      /* ─── titlebar ─── */
      .titlebar {
        background: #2e2230;
        height: 42px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        border-bottom: 1px solid #1e1420;
      }

      .tb-title {
        color: #ccc;
        font-size: 13px;
        letter-spacing: 0.3px;
      }

      .tb-icons {
        position: absolute;
        right: 8px;
        display: flex;
        align-items: center;
        gap: 2px;
      }

      .tb-btn {
        width: 30px;
        height: 30px;
        border-radius: 5px;
        border: none;
        background: transparent;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s;
      }
      .tb-btn:hover {
        background: rgba(255, 255, 255, 0.1);
      }
      .tb-btn.close:hover {
        background: #c0392b;
      }
      .tb-btn svg {
        display: block;
      }

      .tb-left {
        position: absolute;
        left: 8px;
      }

      /* ─── body ─── */
      .term-body {
        background: #2d0a2e;
        padding: 18px 20px 22px;
        color: #d4c4d3;
        font-size: 15px;
        line-height: 1.6;
        min-height: 400px;
      }

      .line {
        white-space: pre-wrap;
        word-break: break-all;
      }

      .user {
        color: #8ae234;
        font-weight: 700;
      }
      .path {
        color: #5ea6d9;
        font-weight: 700;
      }
      .dollar {
        color: #8ae234;
        font-weight: 700;
      }
      .cmd {
        color: #fff;
      }
      .green {
        color: #8ae234;
      }
      .cyan {
        color: #5ea6d9;
      }
      .yellow {
        color: #edd400;
      }

      .cursor {
        display: inline-block;
        width: 9px;
        height: 17px;
        background: #d4c4d3;
        vertical-align: text-bottom;
        animation: blink 1.05s step-end infinite;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      .typing {
        display: inline;
      }
    </style>
  </head>
  <body>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="portfolio.html">Portfolio</a></li>
      </ul>
    </nav>

    <div class="terminal">
      <!-- titlebar -->
      <div class="titlebar">
        <div class="tb-left">
          <button class="tb-btn">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <rect x="2" y="3" width="14" height="2" rx="1" fill="#aaa" />
              <rect x="2" y="8" width="14" height="2" rx="1" fill="#aaa" />
              <rect x="2" y="13" width="14" height="2" rx="1" fill="#aaa" />
            </svg>
          </button>
        </div>

        <span class="tb-title">nandanap@ubuntu: ~</span>

        <div class="tb-icons">
          <button class="tb-btn">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <circle
                cx="7"
                cy="7"
                r="4.5"
                stroke="#aaa"
                stroke-width="1.8"
                fill="none"
              />
              <line
                x1="10.2"
                y1="10.2"
                x2="14"
                y2="14"
                stroke="#aaa"
                stroke-width="1.8"
                stroke-linecap="round"
              />
            </svg>
          </button>
          <button class="tb-btn">
            <svg width="18" height="14" viewBox="0 0 18 14" fill="none">
              <rect y="0" width="18" height="2" rx="1" fill="#aaa" />
              <rect y="6" width="18" height="2" rx="1" fill="#aaa" />
              <rect y="12" width="18" height="2" rx="1" fill="#aaa" />
            </svg>
          </button>
          <button class="tb-btn">
            <svg width="16" height="3" viewBox="0 0 16 3" fill="none">
              <rect width="16" height="2.5" rx="1.2" fill="#aaa" />
            </svg>
          </button>
          <button class="tb-btn">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
              <rect
                x="0.8"
                y="0.8"
                width="13.4"
                height="13.4"
                rx="1.6"
                stroke="#aaa"
                stroke-width="1.6"
                fill="none"
              />
            </svg>
          </button>
          <button class="tb-btn close">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
              <line
                x1="1.5"
                y1="1.5"
                x2="11.5"
                y2="11.5"
                stroke="#aaa"
                stroke-width="1.8"
                stroke-linecap="round"
              />
              <line
                x1="11.5"
                y1="1.5"
                x2="1.5"
                y2="11.5"
                stroke="#aaa"
                stroke-width="1.8"
                stroke-linecap="round"
              />
            </svg>
          </button>
        </div>
      </div>

      <div class="term-body" id="screen"></div>
    </div>

    <script>
      (function () {
        const S = document.getElementById("screen");
        let currentLine = null;
        let currentText = "";
        let charIndex = 0;

        function createPrompt() {
          return '<span class="user">nandanap@ubuntu</span><span class="path">:~</span><span class="dollar">$</span> ';
        }

        const commands = [
          {
            type: "command",
            text: "cat about.txt",
            delay: 50,
          },
          {
            type: "output",
            lines: [
              "",
              '<span class="yellow">============================================</span>',
              '<span class="yellow">            NANDANA  P                      </span>',
              '<span class="yellow">============================================</span>',
              '<span class="green">Email   : </span>nandanap118@gmail.com',
              '<span class="green">LinkedIn: </span>linkedin.com/nandanap03/',
              '<span class="green">GitHub  : </span>github.com/nandanap24',
              "",
            ],
            delay: 40,
          },
          {
            type: "command",
            text: "cat skills.txt",
            delay: 50,
          },
          {
            type: "output",
            lines: [
              "",
              '<span class="cyan">[Programming Languages]</span>',
              "  Python",
              "  Java",
              "  JavaScript",
              "",
              '<span class="cyan">[Technologies]</span>',
              "  RESTful APIs",
              "  Linux",
              "  Containerization",
              "",
              '<span class="cyan">[Tools / Platforms]</span>',
              "  Git",
              "  GitHub",
              "  Docker",
              "  Linux (Bash)",
              "  VS Code",
              "  Postman",
              "",
              '<span class="cyan">[Databases]</span>',
              "  MySQL / PostgreSQL",
              "  MongoDB",
              "",
            ],
            delay: 40,
          },
        ];

        let commandIndex = 0;
        let lineIndex = 0;

        function typeCommand(command, callback) {
          const line = document.createElement("div");
          line.className = "line";
          line.innerHTML = createPrompt();
          S.appendChild(line);

          const typingSpan = document.createElement("span");
          typingSpan.className = "typing cmd";
          line.appendChild(typingSpan);

          const cursor = document.createElement("span");
          cursor.className = "cursor";
          line.appendChild(cursor);

          let i = 0;
          function type() {
            if (i < command.length) {
              typingSpan.textContent += command[i];
              i++;
              S.scrollTop = S.scrollHeight;
              setTimeout(type, command.delay);
            } else {
              cursor.remove();
              setTimeout(callback, 200);
            }
          }
          setTimeout(type, 400);
        }

        function showOutput(lines, delay, callback) {
          let i = 0;
          function showLine() {
            if (i < lines.length) {
              const line = document.createElement("div");
              line.className = "line";
              if (lines[i] === "") {
                line.innerHTML = "&nbsp;";
              } else {
                line.innerHTML = lines[i];
              }
              S.appendChild(line);
              S.scrollTop = S.scrollHeight;
              i++;
              setTimeout(showLine, delay);
            } else {
              setTimeout(callback, 300);
            }
          }
          showLine();
        }

        function showPromptWithCursor() {
          const line = document.createElement("div");
          line.className = "line";
          line.innerHTML = createPrompt() + '<span class="cursor"></span>';
          S.appendChild(line);
          S.scrollTop = S.scrollHeight;
        }

        function processNext() {
          if (commandIndex >= commands.length) {
            showPromptWithCursor();
            return;
          }

          const current = commands[commandIndex];
          commandIndex++;

          if (current.type === "command") {
            typeCommand(current.text, processNext);
          } else if (current.type === "output") {
            showOutput(current.lines, current.delay, processNext);
          }
        }

        setTimeout(processNext, 500);
      })();
    </script>
  </body>
